server {
  listen 80;
  server_name _;
  resolver 127.0.0.11 valid=30s ipv6=off;

  # Defaults for proxying HTTP + websocket upgrades.
  proxy_http_version 1.1;
  proxy_set_header Host $host;
  proxy_set_header X-Real-IP $remote_addr;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;
  proxy_set_header Upgrade $http_upgrade;
  proxy_set_header Connection "upgrade";

  location = / {
    return 302 /admin;
  }

  location = /openwebui {
    return 301 /openwebui/;
  }

  location = /comfyui {
    return 301 /comfyui/;
  }

  location /openwebui/ {
    set $openwebui_upstream open-webui:8080;
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;
    proxy_pass http://$openwebui_upstream/;
  }

  # OpenWebUI compatibility paths when frontend emits absolute URLs.
  location ^~ /_app/ {
    set $openwebui_upstream open-webui:8080;
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;
    proxy_pass http://$openwebui_upstream/_app/;
  }

  location ^~ /static/ {
    set $openwebui_upstream open-webui:8080;
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;
    proxy_pass http://$openwebui_upstream/static/;
  }

  location ^~ /api/v1/ {
    set $openwebui_upstream open-webui:8080;
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;
    proxy_pass http://$openwebui_upstream/api/v1/;
  }

  location = /favicon.png {
    set $openwebui_upstream open-webui:8080;
    proxy_pass http://$openwebui_upstream/favicon.png;
  }

  location = /manifest.json {
    set $openwebui_upstream open-webui:8080;
    proxy_pass http://$openwebui_upstream/manifest.json;
  }

  location /comfyui/ {
    set $comfy_upstream comfyui:8188;
    client_max_body_size 100m;
    proxy_buffering off;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
    proxy_pass http://$comfy_upstream/;
  }

  # ComfyUI frontend sometimes emits absolute asset paths (for example
  # /index-*.js, /vendor-*.js, /extensions/*). If those paths are not
  # matched here, they fall through to the admin upstream and return HTML.
  location ^~ /extensions/ {
    set $comfy_upstream comfyui:8188;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
    proxy_pass http://$comfy_upstream/extensions/;
  }

  location ^~ /assets/ {
    set $comfy_upstream comfyui:8188;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
    proxy_pass http://$comfy_upstream/assets/;
  }

  location ~* "^/[A-Za-z0-9_.-]+-[A-Za-z0-9_-]{6,}\.(?:js|mjs|css|json|map|png|jpg|jpeg|gif|svg|ico|webp|woff|woff2|ttf|eot)$" {
    set $comfy_upstream comfyui:8188;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
    proxy_pass http://$comfy_upstream;
  }

  # ComfyUI websocket fallback when frontend requests absolute /ws.
  location = /ws {
    set $comfy_upstream comfyui:8188;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
    proxy_pass http://$comfy_upstream/ws;
  }

  # ComfyUI websocket when frontend is mounted under /comfyui/.
  location = /comfyui/ws {
    set $comfy_upstream comfyui:8188;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
    proxy_pass http://$comfy_upstream/ws;
  }

  # Admin app and its API/Auth endpoints.
  location / {
    set $admin_upstream admin-panel:8080;
    proxy_read_timeout 120s;
    proxy_send_timeout 120s;
    proxy_pass http://$admin_upstream;
  }
}
