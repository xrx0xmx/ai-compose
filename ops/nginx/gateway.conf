server {
  listen 80;
  server_name _;
  resolver 127.0.0.11 valid=30s ipv6=off;

  # Defaults for proxying HTTP + websocket upgrades.
  proxy_http_version 1.1;
  proxy_set_header Host $host;
  proxy_set_header X-Real-IP $remote_addr;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;
  proxy_set_header Upgrade $http_upgrade;
  proxy_set_header Connection "upgrade";

  location = / {
    return 302 /admin;
  }

  location = /openwebui {
    return 301 /openwebui/;
  }

  location = /comfyui {
    return 301 /comfyui/;
  }

  # OpenWebUI — strip /openwebui prefix so the app sees itself at /.
  # IMPORTANT: when proxy_pass uses a variable, nginx does NOT perform
  # location-prefix substitution; it concatenates the proxy_pass URI with
  # the original request URI, producing double paths like /_app/_app/...
  # The fix is to rewrite the URI first and use proxy_pass with no URI part.
  location /openwebui/ {
    set $openwebui_upstream open-webui:8080;
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;
    rewrite ^/openwebui/(.*)$ /$1 break;
    proxy_pass http://$openwebui_upstream;
  }

  # OpenWebUI absolute asset paths emitted by SvelteKit (/_app/, /static/, …).
  # Pass through unchanged — no URI suffix on proxy_pass.
  location ^~ /_app/ {
    set $openwebui_upstream open-webui:8080;
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;
    proxy_pass http://$openwebui_upstream;
  }

  location ^~ /static/ {
    set $openwebui_upstream open-webui:8080;
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;
    proxy_pass http://$openwebui_upstream;
  }

  location ^~ /api/v1/ {
    set $openwebui_upstream open-webui:8080;
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;
    proxy_pass http://$openwebui_upstream;
  }

  location = /favicon.png {
    set $openwebui_upstream open-webui:8080;
    proxy_pass http://$openwebui_upstream;
  }

  location = /manifest.json {
    set $openwebui_upstream open-webui:8080;
    proxy_pass http://$openwebui_upstream;
  }

  # ComfyUI — strip /comfyui prefix so the app sees itself at /.
  location /comfyui/ {
    set $comfy_upstream comfyui:8188;
    client_max_body_size 100m;
    proxy_buffering off;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
    rewrite ^/comfyui/(.*)$ /$1 break;
    proxy_pass http://$comfy_upstream;
  }

  # ComfyUI absolute asset paths — pass through unchanged.
  location ^~ /extensions/ {
    set $comfy_upstream comfyui:8188;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
    proxy_pass http://$comfy_upstream;
  }

  location ^~ /assets/ {
    set $comfy_upstream comfyui:8188;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
    proxy_pass http://$comfy_upstream;
  }

  location ~* "^/[A-Za-z0-9_.-]+-[A-Za-z0-9_-]{6,}\.(?:js|mjs|css|json|map|png|jpg|jpeg|gif|svg|ico|webp|woff|woff2|ttf|eot)$" {
    set $comfy_upstream comfyui:8188;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
    proxy_pass http://$comfy_upstream;
  }

  # ComfyUI websocket — absolute /ws path, pass through unchanged.
  location = /ws {
    set $comfy_upstream comfyui:8188;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
    proxy_pass http://$comfy_upstream;
  }

  # ComfyUI websocket — strip /comfyui prefix.
  location = /comfyui/ws {
    set $comfy_upstream comfyui:8188;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
    rewrite ^/comfyui(/ws)$ $1 break;
    proxy_pass http://$comfy_upstream;
  }

  # Admin app and its API/Auth endpoints.
  location / {
    set $admin_upstream admin-panel:8080;
    proxy_read_timeout 120s;
    proxy_send_timeout 120s;
    proxy_pass http://$admin_upstream;
  }
}
