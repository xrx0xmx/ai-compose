upstream open_webui_upstream {
  server open-webui:8080;
}

upstream admin_panel_upstream {
  server admin-panel:8080;
}

upstream comfyui_upstream {
  server comfyui:8188;
}

# Port 80 only serves health and redirects the rest to HTTPS.
server {
  listen 80;
  listen [::]:80;
  server_name _;

  location = /nginx-health {
    access_log off;
    add_header Content-Type text/plain;
    return 200 'ok';
  }

  location / {
    return 301 https://$host$request_uri;
  }
}

server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name _;

  ssl_certificate /etc/nginx/certs/fullchain.pem;
  ssl_certificate_key /etc/nginx/certs/privkey.pem;
  ssl_session_timeout 10m;
  ssl_session_cache shared:SSL:10m;
  ssl_protocols TLSv1.2 TLSv1.3;

  client_max_body_size 64m;

  proxy_set_header Host $host;
  proxy_set_header X-Real-IP $remote_addr;
  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
  proxy_set_header X-Forwarded-Proto $scheme;
  proxy_set_header X-Forwarded-Host $host;
  proxy_set_header X-Forwarded-Port $server_port;
  proxy_http_version 1.1;
  proxy_set_header Upgrade $http_upgrade;
  proxy_set_header Connection $connection_upgrade;
  proxy_read_timeout 900s;
  proxy_send_timeout 900s;

  location = /nginx-health {
    access_log off;
    add_header Content-Type text/plain;
    return 200 'ok';
  }

  location = /admin {
    proxy_pass http://admin_panel_upstream/admin;
  }

  location = /admin/ {
    return 302 /admin;
  }

  location /admin-api/ {
    proxy_pass http://admin_panel_upstream/api/;
  }

  location /admin-auth/ {
    proxy_pass http://admin_panel_upstream/auth/;
  }

  location = /_admin_auth_check {
    internal;
    proxy_pass http://admin_panel_upstream/auth/check;
    proxy_pass_request_body off;
    proxy_set_header Content-Length "";
    proxy_set_header X-Original-URI $request_uri;
    proxy_set_header Cookie $http_cookie;
    proxy_set_header Authorization $http_authorization;
  }

  location /comfy/ {
    auth_request /_admin_auth_check;
    proxy_pass http://comfyui_upstream/;
  }

  location / {
    proxy_pass http://open_webui_upstream;
  }
}
